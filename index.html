<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAP Business One – Control Center</title>

  <script
    id="sap-ui-bootstrap"
    src="https://ui5.sap.com/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-libs="sap.m,sap.f,sap.tnt,sap.ui.layout"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="false"
    data-sap-ui-frameOptions="allow"
  ></script>

  <style>
    html, body, #b1-root { height: 100%; margin: 0; overflow: hidden; }
    .sapTNTToolPage { height: 100vh !important; }
    .b1cc-ctx-bar.sapMBar {
      background: var(--sapList_HeaderBackground, #f5f6f7);
      border-bottom: 1px solid var(--sapList_BorderColor, #e0e0e0);
      min-height: 2.75rem;
    }
    .b1cc-ctx-bar .sapMSegB { background: transparent; }
    /* Wizard nav */
    .b1wzNavPanel { background: var(--sapList_HeaderBackground,#f5f6f7); border-right: 1px solid var(--sapList_BorderColor,#e0e0e0); min-width: 210px; }
    .b1wzNavActive { background: var(--sapList_SelectionBackgroundColor,#e8f3ff) !important; border-left: 3px solid var(--sapBrandColor,#0070b1); }
    .b1wzNavLabel { color: var(--sapTextColor,#32363a); padding: 0.25rem 0.75rem; font-size: 0.875rem; }
    .b1wzNavLabelActive { color: var(--sapBrandColor,#0070b1); padding: 0.25rem 0.75rem; font-size: 0.875rem; font-weight: bold; }
    .b1wzContent { flex: 1 1 auto; min-width: 0; overflow: hidden; }
    .b1wzFormRow { margin-bottom: 0.75rem; }
    .b1wzFormLabel { min-width: 9rem; }

    /* Wizard styles */
    .b1wzNavPanel {
      border-right: 1px solid var(--sapList_BorderColor, #e0e0e0);
      padding: 0.5rem 0;
      min-width: 13rem;
    }
    .b1wzContent { padding: 0.5rem; }
    .b1wzNavLabel { color: var(--sapContent_LabelColor); font-size: 0.875rem; }
    .b1wzNavLabelActive { color: var(--sapHighlightColor, #0854a0); font-size: 0.875rem; font-weight: bold; }
    .b1wzNavActive { background: var(--sapList_SelectionBackgroundColor, #e8f1fb) !important; border-radius: 0.25rem; }
    .b1ccWizContent { padding: 0.75rem 1.5rem !important; }
  </style>
</head>
<body class="sapUiBody sapUiSizeCozy" id="b1-root">

<script>
sap.ui.getCore().attachInit(function () {
  "use strict";

  var ALL_SECTIONS = [
    "home","customers","companies","releases","licenses","extensions",
    "instances","deploy","ha","monitoring"
  ];
  var SECTION_TITLES = {
    home:       "Control Center",
    customers:  "Customers",
    companies:  "Companies",
    releases:   "Releases",
    licenses:   "Licenses",
    extensions: "Extensions",
    instances:  "Database Instances",
    deploy:     "Deployments",
    ha:         "High Availability",
    monitoring: "Monitoring"
  };

  var oModel = new sap.ui.model.json.JSONModel({
    pageTitle: "Control Center",
    activeUsers: [
      { name:"John Smith",   email:"j.smith@cronus.com",   role:"Administrator",        company:"CRONUS International", module:"Administration",  loginTime:"08:14", session:"2h 05m", statusText:"Active", statusState:"Success", statusIcon:"sap-icon://status-positive"    },
      { name:"Maria Garcia", email:"m.garcia@cronus.com",  role:"Sales Manager",        company:"CRONUS International", module:"Sales A/R",        loginTime:"08:32", session:"1h 47m", statusText:"Active", statusState:"Success", statusIcon:"sap-icon://status-positive"    },
      { name:"Peter Chen",   email:"p.chen@cronus.com",    role:"Finance Manager",      company:"CRONUS International", module:"Banking",          loginTime:"09:05", session:"1h 14m", statusText:"Idle",   statusState:"Warning", statusIcon:"sap-icon://time-entry-request" },
      { name:"Anna Müller",  email:"a.muller@cronus.de",   role:"Warehouse Manager",    company:"CRONUS Germany",       module:"Inventory",        loginTime:"07:58", session:"2h 21m", statusText:"Active", statusState:"Success", statusIcon:"sap-icon://status-positive"    },
      { name:"James Okafor", email:"j.okafor@cronus.com",  role:"Purchaser",            company:"CRONUS International", module:"Purchasing A/P",   loginTime:"09:30", session:"0h 49m", statusText:"Active", statusState:"Success", statusIcon:"sap-icon://status-positive"    },
      { name:"Sofia Rossi",  email:"s.rossi@cronus.it",    role:"Accountant",           company:"CRONUS Italy",         module:"Financials",       loginTime:"08:45", session:"1h 34m", statusText:"Idle",   statusState:"Warning", statusIcon:"sap-icon://time-entry-request" },
      { name:"Liu Wei",      email:"l.wei@cronus.cn",      role:"Sales Representative", company:"CRONUS Asia",          module:"CRM",              loginTime:"10:02", session:"0h 17m", statusText:"Active", statusState:"Success", statusIcon:"sap-icon://status-positive"    },
      { name:"Carlos Ramos", email:"c.ramos@cronus.com",   role:"Service Technician",   company:"CRONUS International", module:"Service",          loginTime:"08:20", session:"1h 59m", statusText:"Active", statusState:"Success", statusIcon:"sap-icon://status-positive"    },
      { name:"Emily Taylor", email:"e.taylor@cronus.com",  role:"HR Manager",           company:"CRONUS International", module:"Human Resources",  loginTime:"09:15", session:"1h 04m", statusText:"Idle",   statusState:"Warning", statusIcon:"sap-icon://time-entry-request" },
      { name:"Raj Patel",    email:"r.patel@cronus.in",    role:"IT Consultant",        company:"CRONUS India",         module:"Administration",   loginTime:"10:30", session:"0h 06m", statusText:"Active", statusState:"Success", statusIcon:"sap-icon://status-positive"    }
    ]
  });

  /* ── Controller ── */
  sap.ui.controller("b1cc.Main", {

    _showSection: function (sKey) {
      var self = this;
      ALL_SECTIONS.forEach(function (id) {
        var o = self.byId(id + "Section");
        if (o) o.setVisible(id === sKey);
      });
      self.getView().getModel().setProperty("/pageTitle", SECTION_TITLES[sKey] || "Control Center");
    },

    onSideNavToggle: function () {
      var tp = this.byId("toolPage");
      tp.setSideExpanded(!tp.getSideExpanded());
    },

    onNavContextChange: function (oEvent) {
      var bIsB1 = oEvent.getParameter("item").getKey() === "b1";
      this.byId("n-business").setVisible(bIsB1);
      this.byId("n-platform").setVisible(!bIsB1);
      this._showSection(bIsB1 ? "home" : "instances");
    },

    onNavSelect: function (oEvent) {
      var sKey = oEvent.getParameter("item").getKey();
      if (sKey && ALL_SECTIONS.indexOf(sKey) >= 0) {
        this._showSection(sKey);
      }
    },

    onTilePress: function (oEvent) {
      sap.m.MessageToast.show("Opening: " + oEvent.getSource().getHeader());
    },

    onActiveUsersTilePress: function () {
      this.byId("mainNav").to(this.byId("activeUsersPage").getId());
    },

    onNavBack: function () {
      this.byId("mainNav").back();
    },

    onMsgClose: function () {
      this.byId("releaseStrip").setVisible(false);
    },

    /* ══════════════════════════════════════════════════
       TENANT CREATION WIZARD  — full-page Fiori Wizard
    ══════════════════════════════════════════════════ */
    _wiz:  null,   // sap.m.Wizard instance
    _wizS: {},     // wizard state

    onNewCompanyPress: function () {
      var self = this;
      // Quick mode picker before navigating
      var oDlg  = new sap.m.Dialog({
        title: "Company Creation Wizard",
        contentWidth: "30rem",
        content:[
          new sap.ui.core.HTML({
            content:
              '<div style="padding:1rem 1.5rem 0.5rem 1.5rem;font-family:var(--sapFontFamily,\'72\',sans-serif);color:var(--sapTextColor,#32363a)">' +
              '<div style="font-size:1rem;font-weight:700;margin-bottom:0.5rem">Welcome to the Company Creation Wizard.</div>' +
              '<div style="font-size:0.875rem;margin-bottom:1rem">You can use this wizard to create a new Company. Select a creation option and choose Start.</div>' +
              '<div style="font-size:0.875rem;font-weight:700;margin-bottom:0.5rem">Creation Options</div>' +
              '<label style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;cursor:pointer">' +
                '<input type="radio" id="wizModeNew" name="wizMode" value="new" checked style="width:1rem;height:1rem;accent-color:#0070b1"> New — Create a new company' +
              '</label>' +
              '<label style="display:flex;align-items:center;gap:0.75rem;cursor:pointer">' +
                '<input type="radio" id="wizModeBkp" name="wizMode" value="backup" style="width:1rem;height:1rem;accent-color:#0070b1"> From Backup — Restore company from backup file' +
              '</label>' +
              '</div>'
          })
        ],
        beginButton: new sap.m.Button({
          text:"Start Wizard", type:"Emphasized",
          press: function(){
            var el = document.querySelector('input[name="wizMode"]:checked');
            var sMode = (el && el.value === "backup") ? "backup" : "new";
            oDlg.close();
            self._startWizardPage(sMode);
          }
        }),
        endButton: new sap.m.Button({ text:"Cancel", press: function(){ oDlg.close(); } })
      });
      oDlg.open();
    },

    _startWizardPage: function (sMode) {
      var self = this;
      self._wizS = { mode: sMode, customer:null, instance:null, backup:null,
                     tenantName:"", dbName:"", purpose:"",
                     users: self._wizMockUsers(),
                     sendEmail: false, _provDone: false };
      self._buildWizardPage();
      self.byId("mainNav").to(self.byId("wizardPage").getId());
    },

    _wizMockUsers: function () {
      return [
        { include:true,  userCode:"harigijs",     systemUser:"harigijs",     type:"Customer", roles:["Customer Administrator"],          superuser:false, license:"Professional" },
        { include:true,  userCode:"gijstest1",    systemUser:"gijstest1",    type:"Customer", roles:["Business User"],                   superuser:false, license:"Limited"      },
        { include:false, userCode:"kosto2",        systemUser:"kosto2",       type:"Customer", roles:["Business User"],                   superuser:false, license:""             },
        { include:false, userCode:"kosto",         systemUser:"kosto",        type:"Customer", roles:["Consultant"],                      superuser:false, license:""             },
        { include:true,  userCode:"sapserviceb1c", systemUser:"sapserviceb1c",type:"Operator", roles:["Landscape Operator"],              superuser:true,  license:"Professional" },
        { include:false, userCode:"c5252580",      systemUser:"c5252580",     type:"Operator", roles:["Landscape Operator"],              superuser:false, license:""             },
        { include:false, userCode:"i043704",       systemUser:"i043704",      type:"Operator", roles:["Consultant","Business User"],      superuser:false, license:""             },
        { include:false, userCode:"test",          systemUser:"test",         type:"Operator", roles:["Business User"],                   superuser:false, license:""             }
      ];
    },

    // Base pool counts (before any assignments in this wizard session)
    _wizPoolBase: {
      "Professional": { total:45, baseline:29 },
      "Limited":       { total:25, baseline:10 },
      "Mobile Service":{ total:10, baseline:5  },
      "Starter Package":{ total:10, baseline:2 },
      "Auditor":        { total:5,  baseline:0 }
    },

    _wizCalcPool: function () {
      var self = this;
      // Count how many included users have each license assigned
      var counts = {};
      self._wizS.users.forEach(function(u){
        if (u.include && u.license) counts[u.license] = (counts[u.license]||0) + 1;
      });
      return Object.keys(self._wizPoolBase).map(function(k){
        var b = self._wizPoolBase[k];
        var assigned = counts[k] || 0;
        return { name: k==="Professional"?"SAP Business One Professional":
                       k==="Limited"?"SAP Business One Limited":
                       k==="Mobile Service"?"Mobile Service User":
                       k==="Starter Package"?"Starter Package":"Auditor",
                 key: k,
                 used: b.baseline + assigned,
                 total: b.total };
      });
    },

    _buildWizardPage: function () {
      var self = this;
      var oWizPage = self.byId("wizardPage");
      // Remove previous wizard if exists
      var oOld = oWizPage.getContent ? oWizPage.getContent()[0] : null;
      if (oOld && oOld.destroy) oOld.destroy();
      oWizPage.removeAllContent();

      // ── Step 1: Select Customer ──
      var oStep1 = new sap.m.WizardStep({ title:"Select Customer", icon:"sap-icon://group", nextButtonText:"Select Database Instance",
        complete: function(){ oStep1.setValidated(true); } });
      oStep1.addContent(new sap.m.Text({ text:"Select the customer for which you want to create a tenant.", wrapping:true }).addStyleClass("sapUiSmallMarginBottom"));
      var aCust = [
        {name:"Intercompany Dev",     type:"Customer", installNo:"SAP-INTERN"},
        {name:"EDS Customer HANA",    type:"Customer", installNo:"SAP-INTERN"},
        {name:"CRONUS International", type:"Customer", installNo:"SAP-INTERN"},
        {name:"UPN Test",             type:"Customer", installNo:""},
        {name:"EDS Customer",         type:"Customer", installNo:"SAP-INTERN"},
        {name:"CRONUS Germany",       type:"Customer", installNo:"SAP-INTERN"},
        {name:"TestScenario",         type:"Customer", installNo:""},
        {name:"SBODEMO_HU",           type:"Customer", installNo:""},
        {name:"TestCustomer",         type:"Customer", installNo:"SAP-INTERN"}
      ];
      var oTbl1 = self._wizTable(["Status","Customer Name","Customer Type","Installation Number"],
        aCust, ["sap-icon://person-placeholder","name","type","installNo"],
        function(oE){
          self._wizS.customer = oE.getParameter("listItem").getBindingContext("wd").getObject();
          oStep1.setValidated(true);
        }, false);
      oStep1.addContent(oTbl1);
      oStep1.setValidated(false);

      // ── Step 2: Select Database Instance ──
      var oStep2 = new sap.m.WizardStep({ title:"Select Database Instance", icon:"sap-icon://database", nextButtonText:"Tenant Information" });
      oStep2.addContent(new sap.m.Text({ text:"Select the database instance in which you want to create a tenant.", wrapping:true }).addStyleClass("sapUiSmallMarginBottom"));
      var aInst = [
        {name:"DB-PROD-001",purpose:"Productive",version:"1000.190.09",tenants:"12"},
        {name:"DB-PROD-002",purpose:"Productive",version:"1000.170.07",tenants:"8"},
        {name:"DB-TEST-001",purpose:"Testing",   version:"1000.230.13",tenants:"4"},
        {name:"DB-PROD-003",purpose:"Productive",version:"1000.250.15",tenants:"15"},
        {name:"DB-PROD-004",purpose:"Productive",version:"1000.260.16",tenants:"10"},
        {name:"DB-PROD-005",purpose:"Productive",version:"1000.280.18",tenants:"6"},
        {name:"DB-TEST-002",purpose:"Testing",   version:"1000.300.20",tenants:"2"},
        {name:"DB-PROD-007",purpose:"Productive",version:"1000.310.21",tenants:"11"}
      ];
      var oTbl2 = self._wizTable(["Status","Name","Purpose","Version","Number of Tenants"],
        aInst, ["sap-icon://database","name","purpose","version","tenants"],
        function(oE){
          self._wizS.instance = oE.getParameter("listItem").getBindingContext("wd").getObject();
          oStep2.setValidated(true);
        }, false);
      oStep2.addContent(oTbl2);
      oStep2.setValidated(false);

      // ── Step 3 (Backup only): Select Backup ──
      var oStep3Bkp = new sap.m.WizardStep({ title:"Select Backup", icon:"sap-icon://save",
        nextButtonText:"Tenant Information", visible: self._wizS.mode === "backup" });
      oStep3Bkp.addContent(new sap.m.Text({ text:"Select a backup file to restore the tenant from.", wrapping:true }).addStyleClass("sapUiSmallMarginBottom"));
      var aBkp = [
        {file:"CRONUS_INT_20260520_0200.bak", date:"2026-05-20 02:00", size:"2.4 GB", type:"Full"},
        {file:"CRONUS_INT_20260519_0200.bak", date:"2026-05-19 02:00", size:"2.3 GB", type:"Full"},
        {file:"CRONUS_INT_20260518_0200.bak", date:"2026-05-18 02:00", size:"2.3 GB", type:"Full"},
        {file:"CRONUS_DE_20260520_0200.bak",  date:"2026-05-20 02:00", size:"1.8 GB", type:"Full"},
        {file:"CRONUS_DE_20260519_0200.bak",  date:"2026-05-19 02:00", size:"1.7 GB", type:"Full"}
      ];
      var oTbl3 = self._wizTable(["Backup File","Date","Size","Type"],
        aBkp, ["file","date","size","type"],
        function(oE){
          self._wizS.backup = oE.getParameter("listItem").getBindingContext("wd").getObject();
          oStep3Bkp.setValidated(true);
        }, false);
      oStep3Bkp.addContent(oTbl3);
      oStep3Bkp.setValidated(self._wizS.mode !== "backup");

      // ── Step 4: Tenant Information ──
      var oStep4 = new sap.m.WizardStep({ title:"Tenant Information", icon:"sap-icon://building", nextButtonText:"Users & Licenses" });
      oStep4.addContent(new sap.m.Text({ text:"Specify the tenant information.", wrapping:true }).addStyleClass("sapUiSmallMarginBottom"));
      var validateInfo = function(){
        oStep4.setValidated(!!(self._wizS.tenantName && self._wizS.dbName && self._wizS.purpose));
      };
      var mkRow = function(lbl, oCtrl, bReq){
        var r = new sap.m.HBox({ alignItems:"Center", class:"sapUiSmallMarginBottom" });
        r.addItem(new sap.m.Label({ text:lbl, required:!!bReq, width:"10rem" }));
        r.addItem(oCtrl); return r;
      };
      oStep4.addContent(mkRow("Company Name",
        new sap.m.Input({ width:"20rem", placeholder:"Required", value: self._wizS.tenantName,
          liveChange:function(oE){ self._wizS.tenantName=oE.getParameter("value"); validateInfo(); } }), true));
      oStep4.addContent(mkRow("Database Name",
        new sap.m.Input({ width:"20rem", placeholder:"Required", value: self._wizS.dbName,
          liveChange:function(oE){ self._wizS.dbName=oE.getParameter("value"); validateInfo(); } }), true));
      oStep4.addContent(mkRow("Purpose",
        new sap.m.Select({ width:"20rem", selectedKey: self._wizS.purpose,
          change:function(oE){ self._wizS.purpose=oE.getParameter("selectedItem").getKey(); validateInfo(); },
          items:[ new sap.ui.core.Item({key:"",text:""}),
                  new sap.ui.core.Item({key:"Productive",text:"Productive"}),
                  new sap.ui.core.Item({key:"Testing",   text:"Testing"}),
                  new sap.ui.core.Item({key:"Demo",      text:"Demo"}) ] }), true));
      oStep4.setValidated(false);

      // ── Step 5: Users & Licenses ──
      var oStep5 = new sap.m.WizardStep({ title:"Users & Licenses", icon:"sap-icon://employee", nextButtonText:"Review" });
      oStep5.setValidated(true);
      oStep5.addContent(new sap.m.Text({
        text:"Select which users to include in this tenant, assign a role and a license type to each. Changes update the license pool below in real time.",
        wrapping:true }).addStyleClass("sapUiSmallMarginBottom"));

      var aLicTypes   = ["","Professional","Limited","Mobile Service","Starter Package","Auditor"];
      var aRoles      = ["Business User","Consultant","Customer Administrator","Landscape Operator"];
      var oUsrModel   = new sap.ui.model.json.JSONModel({ users: self._wizS.users });
      var oPoolModel  = new sap.ui.model.json.JSONModel({ pool: self._wizCalcPool() });

      // helper: refresh pool table after any change
      var refreshPool = function(){
        oPoolModel.setProperty("/pool", self._wizCalcPool());
      };

      // ── Users table ──
      var oSelectAllCB = new sap.m.CheckBox({
        text: "Select / Deselect All",
        selected: self._wizS.users.every(function(u){ return u.include; }),
        select: function(oE){
          var bAll = oE.getParameter("selected");
          self._wizS.users.forEach(function(u){ u.include = bAll; });
          oUsrModel.setProperty("/users", self._wizS.users);
          refreshPool();
        }
      });

      var oUsrTbl = new sap.m.Table({
        sticky:["ColumnHeaders"],
        alternateRowColors: true,
        headerToolbar: new sap.m.OverflowToolbar({
          content:[
            new sap.m.Title({ text:"Users", level:"H5" }),
            new sap.m.ToolbarSpacer(),
            oSelectAllCB
          ]
        }),
        columns:[
          new sap.m.Column({ header: new sap.m.Label({text:"Include"}),      width:"5rem",  hAlign:"Center" }),
          new sap.m.Column({ header: new sap.m.Label({text:"User Code"}),    width:"9rem"   }),
          new sap.m.Column({ header: new sap.m.Label({text:"System User"}),  width:"9rem"   }),
          new sap.m.Column({ header: new sap.m.Label({text:"Type"}),         width:"7rem"   }),
          new sap.m.Column({ header: new sap.m.Label({text:"Role"})                         }),
          new sap.m.Column({ header: new sap.m.Label({text:"Superuser"}),    width:"6rem",  hAlign:"Center" }),
          new sap.m.Column({ header: new sap.m.Label({text:"License Type"}), width:"14rem"  })
        ]
      });
      oUsrTbl.setModel(oUsrModel,"wd");
      oUsrTbl.bindItems("wd>/users", new sap.m.ColumnListItem({
        highlight: { path:"wd>include", formatter: function(b){ return b ? "Success" : "None"; } },
        cells:[
          // Include checkbox
          new sap.m.CheckBox({ selected:"{wd>include}", select: function(oE){
            var bVal = oE.getParameter("selected");
            var oCtx = oE.getSource().getBindingContext("wd");
            var sPath = oCtx.getPath();
            oCtx.getModel("wd").setProperty(sPath+"/include", bVal);
            // sync back to wizS
            var idx = parseInt(sPath.replace("/users/",""));
            self._wizS.users[idx].include = bVal;
            // update select-all checkbox state
            oSelectAllCB.setSelected(self._wizS.users.every(function(u){ return u.include; }));
            refreshPool();
          }}),
          new sap.m.Text({text:"{wd>userCode}"}),
          new sap.m.Text({text:"{wd>systemUser}"}),
          new sap.m.ObjectStatus({ text:"{wd>type}",
            state:{ path:"wd>type", formatter:function(t){ return t==="Operator"?"Warning":"Success"; }} }),
          // Role — MultiComboBox (Fiori standard for multi-select inline)
          new sap.m.MultiComboBox({
            selectedKeys:"{wd>roles}",
            items: aRoles.map(function(r){ return new sap.ui.core.Item({key:r,text:r}); }),
            selectionChange: function(oE){
              var oCtx = oE.getSource().getBindingContext("wd");
              var sPath = oCtx.getPath();
              var aKeys = oE.getSource().getSelectedKeys();
              oCtx.getModel("wd").setProperty(sPath+"/roles", aKeys);
              var idx = parseInt(sPath.replace("/users/",""));
              self._wizS.users[idx].roles = aKeys;
            }
          }),
          // Superuser — clickable toggle
          new sap.m.CheckBox({ selected:"{wd>superuser}", select: function(oE){
            var bVal = oE.getParameter("selected");
            var oCtx = oE.getSource().getBindingContext("wd");
            var sPath = oCtx.getPath();
            oCtx.getModel("wd").setProperty(sPath+"/superuser", bVal);
            var idx = parseInt(sPath.replace("/users/",""));
            self._wizS.users[idx].superuser = bVal;
          }}),
          // License type — updates pool on change
          new sap.m.Select({
            selectedKey:"{wd>license}",
            items: aLicTypes.map(function(l){ return new sap.ui.core.Item({key:l,text:l||"—"}); }),
            change: function(oE){
              var oCtx = oE.getSource().getBindingContext("wd");
              var sPath = oCtx.getPath();
              var sLic = oE.getParameter("selectedItem").getKey();
              oCtx.getModel("wd").setProperty(sPath+"/license", sLic);
              var idx = parseInt(sPath.replace("/users/",""));
              self._wizS.users[idx].license = sLic;
              refreshPool();
            }
          })
        ]
      }));
      oStep5.addContent(oUsrTbl);

      // ── License Pool Summary (live) ──
      oStep5.addContent(new sap.m.Title({ text:"License Pool", level:"H5" }).addStyleClass("sapUiMediumMarginTop sapUiTinyMarginBottom"));
      oStep5.addContent(new sap.m.Text({ text:"Available counts update as you assign licenses above.", wrapping:true }).addStyleClass("sapUiTinyMarginBottom"));
      var oPoolTbl = new sap.m.Table({
        alternateRowColors: true,
        columns:[
          new sap.m.Column({ header: new sap.m.Label({text:"License Type"}) }),
          new sap.m.Column({ header: new sap.m.Label({text:"In Use (total)"}), width:"8rem",  hAlign:"End" }),
          new sap.m.Column({ header: new sap.m.Label({text:"Pool Total"}),     width:"7rem",  hAlign:"End" }),
          new sap.m.Column({ header: new sap.m.Label({text:"Available"}),      width:"7rem",  hAlign:"End" }),
          new sap.m.Column({ header: new sap.m.Label({text:"Status"}),         width:"8rem"  })
        ]
      });
      oPoolTbl.setModel(oPoolModel,"wp");
      oPoolTbl.bindItems("wp>/pool", new sap.m.ColumnListItem({ cells:[
        new sap.m.Text({text:"{wp>name}"}),
        new sap.m.Text({text:"{wp>used}",  textAlign:"End"}),
        new sap.m.Text({text:"{wp>total}", textAlign:"End"}),
        new sap.m.Text({text:{ parts:[{path:"wp>used"},{path:"wp>total"}],
          formatter:function(u,t){ return Math.max(0,t-u)+""; }}, textAlign:"End"}),
        new sap.m.ObjectStatus({
          text:{  parts:[{path:"wp>used"},{path:"wp>total"}], formatter:function(u,t){ return u>=t?"Exhausted":u/t>0.8?"Low":"Available"; }},
          state:{ parts:[{path:"wp>used"},{path:"wp>total"}], formatter:function(u,t){ return u>=t?"Error":u/t>0.8?"Warning":"Success"; }} })
      ]}));

      self._wizReviewStep = oStep6;

    _wizTable: function(aCols, aData, aFields, fnSelect, bMulti){
      var oModel = new sap.ui.model.json.JSONModel({ rows: aData });
      var oTbl = new sap.m.Table({
        mode: bMulti ? "MultiSelect" : "SingleSelectMaster",
        selectionChange: fnSelect,
        columns: aCols.map(function(c){ return new sap.m.Column({ header: new sap.m.Label({text:c}) }); })
      });
      oTbl.setModel(oModel,"wd");
      oTbl.bindItems("wd>/rows", new sap.m.ColumnListItem({
        cells: aFields.map(function(f){
          if (f.indexOf("sap-icon://") === 0) return new sap.ui.core.Icon({src:f, color:"#0070b1"});
          return new sap.m.Text({text:"{wd>" + f + "}"});
        })
      }));
      return oTbl;
    },

    _populateReviewStep: function(oStep) {
      var self = this; var s = self._wizS;
      oStep.destroyContent();

      /* ── Notification checkbox (top) ── */
      oStep.addContent(new sap.m.CheckBox({
        text:"Send notification email to tenant users upon new tenant availability",
        selected: !!s.sendEmail,
        select:function(oE){ s.sendEmail=oE.getParameter("selected"); }
      }).addStyleClass("sapUiSmallMarginBottom"));

      /* ── First-login disclaimer (top) ── */
      oStep.addContent(new sap.m.MessageStrip({
        text:"Tenant initialization (e.g. financial periods, chart of accounts) will be completed during the first login to the tenant by an authorized user.",
        type:"Information", showIcon:true
      }).addStyleClass("sapUiSmallMarginBottom"));

      /* ── Settings summary ── */
      oStep.addContent(new sap.m.Text({ text:"Please review your settings before starting provisioning.", wrapping:true }).addStyleClass("sapUiSmallMarginBottom"));

      var oForm = new sap.m.Panel({ backgroundDesign:"Solid", headerText:"Summary" });
      var oVBox = new sap.m.VBox({});
      oVBox.addStyleClass("sapUiSmallMarginBeginEnd sapUiSmallMarginTopBottom");

      var addSect = function(sTitle, aLines){
        oVBox.addItem(new sap.m.Title({text:sTitle, level:"H5"}).addStyleClass("sapUiSmallMarginTop sapUiTinyMarginBottom"));
        aLines.forEach(function(l){ oVBox.addItem(new sap.m.Text({text:l, wrapping:true}).addStyleClass("sapUiTinyMarginBegin")); });
      };

      var c=s.customer||{};   addSect("Customer",          ["Name: "+(c.name||"—"),"Type: "+(c.type||"—"),"Installation Number: "+(c.installNo||"—")]);
      var i=s.instance||{};   addSect("Database Instance", ["Name: "+(i.name||"—"),"Purpose: "+(i.purpose||"—"),"Version: "+(i.version||"—")]);
      if (s.mode==="backup"&&s.backup) addSect("Backup",   ["File: "+s.backup.file,"Date: "+s.backup.date]);
      addSect("Tenant", ["Company Name: "+(s.tenantName||"—"),"Database Name: "+(s.dbName||"—"),"Purpose: "+(s.purpose||"—")]);

      var aIncl = (s.users||[]).filter(function(u){return u.include;});
      if (aIncl.length){
        addSect("Users & Licenses", aIncl.map(function(u){
          var parts = [u.userCode];
          var aRoles = u.roles && u.roles.length ? u.roles : (u.role ? [u.role] : []);
          if (aRoles.length) parts.push(aRoles.join(", "));
          parts.push(u.license||"No license");
          if (u.superuser) parts.push("Superuser");
          return parts.join(" — ");
        }));
      } else {
        addSect("Users & Licenses", ["No users assigned"]);
      }

      oForm.addContent(oVBox);
      oStep.addContent(oForm);
    },

    _startProvisioning: function(oStep) {
      var self = this; var s = self._wizS;
      if (s._provDone) return;
      oStep.destroyContent();
      var oCenter = new sap.m.VBox({ alignItems:"Center", justifyContent:"Center", class:"sapUiLargeMarginTop" });
      var oBusy = new sap.m.BusyIndicator({ size:"3rem", class:"sapUiMediumMarginBottom" });
      var oTitle = new sap.m.Title({
        text: s.mode==="backup" ? "Restoring tenant from backup, please wait…" : "Creating tenant, please wait…",
        level:"H4", textAlign:"Center"
      });
      var oSub = new sap.m.Text({ text:"This may take a few minutes. Do not close this window.", textAlign:"Center" }).addStyleClass("sapUiSmallMarginTop");
      oCenter.addItem(oBusy); oCenter.addItem(oTitle); oCenter.addItem(oSub);
      oStep.addContent(oCenter);
      if (self._wiz) self._wiz.setShowNextButton(false);

      setTimeout(function(){
        s._provDone = true;
        oStep.destroyContent();
        var oSuccess = new sap.m.VBox({ alignItems:"Center", justifyContent:"Center", class:"sapUiLargeMarginTop" });
        oSuccess.addItem(new sap.ui.core.Icon({ src:"sap-icon://sys-enter-2", size:"4rem", color:"#107E3E", class:"sapUiMediumMarginBottom" }));
        oSuccess.addItem(new sap.m.Title({
          text:"Tenant successfully " + (s.mode==="backup"?"restored!":"created!"),
          level:"H4", textAlign:"Center"
        }));
        oSuccess.addItem(new sap.m.Text({
          text:'Company "' + (s.tenantName||"New Tenant") + '" is now available.',
          textAlign:"Center", class:"sapUiSmallMarginTop"
        }));
        if (s.sendEmail){
          oSuccess.addItem(new sap.m.Text({
            text:"Notification emails have been sent to assigned users.",
            textAlign:"Center", class:"sapUiTinyMarginTop"
          }));
        }
        oSuccess.addItem(new sap.m.Button({
          text:"Back to Control Center", type:"Emphasized", class:"sapUiMediumMarginTop",
          press:function(){ self.byId("mainNav").back(); }
        }));
        oStep.addContent(oSuccess);
      }, 3500);
    }

  });
